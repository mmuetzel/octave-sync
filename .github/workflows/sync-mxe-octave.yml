name: Sync MXE-Octave (Mercurial to Git)

on:
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push changes to Git repository"
        required: false
        default: false
        type: boolean
      initialize_mirror:
        description: "Start with empty Git repository"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 3,15 * * *"   # twice a day

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install version control
        run: |
          sudo apt-get update
          sudo apt-get install -y mercurial git python3

      - name: Install hg-fast-export
        run: |
          git clone --branch v260405 https://github.com/frej/fast-export.git ~/fast-export

      - name: Clone upstream Mercurial repository
        run: |
          hg clone https://hg.octave.org/mxe-octave upstream-hg

      - name: Clone Git mirror
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.MIRROR_PUSH_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.initialize_mirror }}" == "true" ]; then
            git init --initial-branch=default git-mirror
            cd git-mirror
            git remote add origin https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/mmuetzel/mxe-octave.git
          else
            git clone https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/mmuetzel/mxe-octave.git git-mirror
          fi

      - name: Convert Mercurial to Git
        run: |
          cd git-mirror
          ~/fast-export/hg-fast-export.sh -r ../upstream-hg --force -M default
          git checkout default

      - name: Push all branches to Git mirror
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.MIRROR_PUSH_TOKEN }}
        run: |
          cd git-mirror
          git remote set-url origin https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/mmuetzel/mxe-octave.git
          if [ "${{ github.event.inputs.force_push }}" == "true" ]; then
            git push --all --force
          else
            git push --all
          fi
          git push --tags --force
